map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Own health probe (not proxied)
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Backend REST
    location /api/ {
        proxy_pass http://adsb-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend WebSocket
    location /ws {
        proxy_pass http://adsb-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Backend /healthz and /readyz for uptime monitoring via same origin
    location = /backend/healthz {
        proxy_pass http://adsb-backend:8000/healthz;
    }
    location = /backend/readyz {
        proxy_pass http://adsb-backend:8000/readyz;
    }

    # tar1090 (Ultrafeeder serves it at its own root) — proxy /tar1090/* -> ultrafeeder/*
    location /tar1090/ {
        proxy_pass http://ultrafeeder:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # graphs1090 — Ultrafeeder serves it at /graphs1090/
    location /graphs1090/ {
        proxy_pass http://ultrafeeder:80/graphs1090/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Direct access to Ultrafeeder JSON (backend already reads it internally,
    # but frontend may want it for debug)
    location /ultra/ {
        proxy_pass http://ultrafeeder:80/;
        proxy_set_header Host $host;
    }

    # Cache immutable Vite-built assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — everything else resolves to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
# === ADSB_OBSERVABILITY_LOCATION_BLOCK_START ===
# Insert inside the existing server {} block that serves the React app.
location /grafana/ {
    proxy_pass http://grafana:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
}
# === ADSB_OBSERVABILITY_LOCATION_BLOCK_END ===

}
