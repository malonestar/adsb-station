<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 32 32" fill="currentColor">
  <!-- Narrow-body airliner: medium swept wings + 2 visible engine pods -->
  <!-- Fuselage -->
  <path d="M16 1.5 L17.3 3 L17.3 11.5 L17.5 22 L20 25 L20 26.5 L16 25.7 L12 26.5 L12 25 L14.5 22 L14.7 11.5 L14.7 3 Z"/>
  <!-- Medium swept wings -->
  <path d="M14.7 11 L2.5 18 L2.5 19.6 L14.7 16 Z"/>
  <path d="M17.3 11 L29.5 18 L29.5 19.6 L17.3 16 Z"/>
  <!-- 2 engine pods (one per wing) -->
  <rect x="7.5" y="14" width="1.5" height="3.5" rx="0.3"/>
  <rect x="23" y="14" width="1.5" height="3.5" rx="0.3"/>
  <!-- Horizontal stabilizer -->
  <path d="M14.5 22 L11.5 24.2 L11.5 25.2 L14.5 23.7 Z"/>
  <path d="M17.5 22 L20.5 24.2 L20.5 25.2 L17.5 23.7 Z"/>
</svg>
