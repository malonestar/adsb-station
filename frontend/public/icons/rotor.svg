<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 32 32" fill="currentColor">
  <!-- Helicopter top view: main rotor disc with visible cross blades, small
       body in the center, tail BOOM extending behind (no wings). -->
  <!-- Main rotor disc — faded so the body underneath reads -->
  <circle cx="16" cy="12" r="7.2" opacity="0.35"/>
  <!-- Two rotor blades (compact — kept INSIDE the disc, not extending sideways
       like wings would) -->
  <rect x="9" y="11.4" width="14" height="1.2" rx="0.4"/>
  <rect x="15.4" y="5" width="1.2" height="14" rx="0.4"/>
  <!-- Cockpit dot -->
  <circle cx="16" cy="12" r="1.6"/>
  <!-- Tail boom — slim, extends straight back, NO horizontal wing -->
  <rect x="15.3" y="19" width="1.4" height="10" rx="0.4"/>
  <!-- Tail rotor at the end of the boom -->
  <rect x="13.5" y="28" width="5" height="1.1" rx="0.3"/>
</svg>
