<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 32 32" fill="currentColor">
  <!-- GA single-engine prop: WIDE straight wings (the visual giveaway vs a
       compact helicopter), small prop disc at the very front. Wings extend
       almost the full viewport to read clearly at radar zoom. -->
  <!-- Small prop disc -->
  <circle cx="16" cy="3.5" r="2.2" opacity="0.5"/>
  <!-- Slim fuselage -->
  <rect x="15.2" y="5" width="1.6" height="18" rx="0.4"/>
  <!-- Wide straight wings extending past the body — clearly "wings", not "blades" -->
  <rect x="0.5" y="13.8" width="31" height="1.8" rx="0.4"/>
  <!-- Tail empennage -->
  <rect x="11" y="22.5" width="10" height="1.4" rx="0.4"/>
</svg>
