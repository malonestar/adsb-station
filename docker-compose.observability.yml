services:
  stats-exporter:
    build:
      context: ./stats-exporter
    image: adsb-stats-exporter:latest
    container_name: adsb-stats-exporter
    restart: unless-stopped
    environment:
      ULTRAFEEDER_URL: "http://ultrafeeder"
      STATS_INTERVAL: "15"
      LISTEN_PORT: "8080"
    depends_on:
      - ultrafeeder
    networks:
      - adsb_net
    labels:
      - "com.adsb.component=observability"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - /mnt/ssd/adsb/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /mnt/ssd/adsb/prometheus/data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=365d'
      - '--storage.tsdb.retention.size=50GB'
      - '--web.enable-lifecycle'
      - '--web.external-url=/'
    depends_on:
      - stats-exporter
      - node-exporter
    networks:
      - adsb_net
    labels:
      - "com.adsb.component=observability"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: "http://192.168.0.113/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PW:?GRAFANA_ADMIN_PW must be set in .env}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - /mnt/ssd/adsb/grafana/data:/var/lib/grafana
      - /mnt/ssd/adsb/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - adsb_net
    labels:
      - "com.adsb.component=observability"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host/root'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker|run)($$|/)'
    networks:
      - adsb_net
    labels:
      - "com.adsb.component=observability"

networks:
  adsb_net:
    external: true
