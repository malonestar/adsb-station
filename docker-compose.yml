services:
  ultrafeeder:
    image: ghcr.io/sdr-enthusiasts/docker-adsb-ultrafeeder:latest
    container_name: ultrafeeder
    hostname: ultrafeeder
    restart: unless-stopped
    device_cgroup_rules:
      - 'c 189:* rwm'
    # No host-port mapping for 80 any more — nginx (adsb-frontend) owns it
    # and reverse-proxies /tar1090 and /graphs1090 through the Docker network.
    ports:
      - "30003:30003"
      - "30005:30005"
      - "9273-9274:9273-9274"
    environment:
      - LOGLEVEL=error
      - TZ=${FEEDER_TZ}
      - READSB_DEVICE_TYPE=${READSB_DEVICE_TYPE}
      - READSB_RTLSDR_DEVICE=${READSB_RTLSDR_DEVICE}
      - READSB_GAIN=${READSB_GAIN}
      - READSB_LAT=${FEEDER_LAT}
      - READSB_LON=${FEEDER_LON}
      - READSB_ALT=${FEEDER_ALT_M}m
      - READSB_NET_ENABLE=true
      - READSB_RX_LOCATION_ACCURACY=2
      - READSB_STATS_RANGE=true
      - READSB_NET_SBS_OUTPUT_PORT=30003
      - READSB_NET_BEAST_OUTPUT_PORT=30005
      - READSB_NET_CONNECTOR=
      - PROMETHEUSMETRICS_ENABLE=true
      - TAR1090_DEFAULTCENTERLAT=${FEEDER_LAT}
      - TAR1090_DEFAULTCENTERLON=${FEEDER_LON}
      - TAR1090_MESSAGERATEINTITLE=true
      - TAR1090_PAGETITLE=ADSB Aurora CO
      - TAR1090_PLANECOUNTINTITLE=true
      - TAR1090_USEROUTESAPI=true
      # Community open-data aggregators (ODbL / free, no signup). One stable UUID
      # across all three — each network tracks receivers independently.
      # mlat-client needs a top-level UUID; per-entry uuid= is used for adsb too.
      - UUID=${FEEDER_UUID}
      - MLAT_USER=${FEEDER_NAME}
      - ULTRAFEEDER_CONFIG=adsb,in.adsb.lol,30004,beast_reduce_plus_out,uuid=${FEEDER_UUID}; mlat,in.adsb.lol,31090,uuid=${FEEDER_UUID}; adsb,feed.adsb.fi,30004,beast_reduce_plus_out,uuid=${FEEDER_UUID}; mlat,feed.adsb.fi,31090,uuid=${FEEDER_UUID}; adsb,feed.airplanes.live,30004,beast_reduce_plus_out,uuid=${FEEDER_UUID}; mlat,feed.airplanes.live,31090,uuid=${FEEDER_UUID}; adsb,feed1.adsbexchange.com,30004,beast_reduce_plus_out,uuid=${FEEDER_UUID}; mlat,feed.adsbexchange.com,31090,uuid=${FEEDER_UUID}
    volumes:
      - /mnt/ssd/data/globe_history:/var/globe_history
      - /mnt/ssd/data/graphs1090:/var/lib/collectd
      - /proc/diskstats:/proc/diskstats:ro
    devices:
      - /dev/bus/usb:/dev/bus/usb
    tmpfs:
      - /run:exec,size=64M
      - /var/log
    networks:
      - adsb_net

  adsb-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: adsb-backend:latest
    container_name: adsb-backend
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - ultrafeeder
    # Port 8000 exposed only so we can test directly during dev. Nginx proxies it.
    ports:
      - "8000:8000"
    environment:
      - ADSB_FEEDER_LAT=${FEEDER_LAT}
      - ADSB_FEEDER_LON=${FEEDER_LON}
      - ADSB_FEEDER_ALT_M=${FEEDER_ALT_M}
      - ADSB_FEEDER_NAME=${FEEDER_NAME}
      - ADSB_FEEDER_TZ=${FEEDER_TZ}
      - ADSB_READSB_AIRCRAFT_URL=http://ultrafeeder/data/aircraft.json
      - ADSB_READSB_RECEIVER_URL=http://ultrafeeder/data/receiver.json
      - ADSB_READSB_STATS_URL=http://ultrafeeder/data/stats.json
      - ADSB_DB_PATH=/data/db/adsb.db
      - ADSB_POLL_INTERVAL_S=1.0
      - ADSB_POSITION_FLUSH_INTERVAL_S=5.0
      - ADSB_LOG_LEVEL=INFO
      - ADSB_LOG_JSON=true
      - TZ=${FEEDER_TZ}
    volumes:
      - /mnt/ssd/data/db:/data/db
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - adsb_net

  adsb-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: adsb-frontend:latest
    container_name: adsb-frontend
    restart: unless-stopped
    depends_on:
      - adsb-backend
      - ultrafeeder
    ports:
      - "80:80"
    networks:
      - adsb_net

networks:
  adsb_net:
    driver: bridge
    name: adsb_net
