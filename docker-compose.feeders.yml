services:
  piaware:
    image: ghcr.io/sdr-enthusiasts/docker-piaware:latest
    container_name: piaware
    hostname: piaware
    restart: unless-stopped
    depends_on:
      - ultrafeeder
    environment:
      - TZ=${FEEDER_TZ}
      - LAT=${FEEDER_LAT}
      - LONG=${FEEDER_LON}
      - FEEDER_ID=${FEEDER_PIAWARE_FEEDER_ID}
      - RECEIVER_TYPE=relay
      - BEASTHOST=ultrafeeder
      - BEASTPORT=30005
      # UAT (978 MHz) feed — dump978 sends raw faup978 messages on :30978
      # which piaware ingests and reports under the same FA site (273304).
      - UAT_RECEIVER_TYPE=relay
      - UAT_RECEIVER_HOST=dump978
    volumes:
      - /mnt/ssd/data/piaware:/var/cache/piaware
    tmpfs:
      - /run:exec,size=64M
      - /var/log
    networks:
      - adsb_net

  fr24feed:
    image: ghcr.io/sdr-enthusiasts/docker-flightradar24:latest
    container_name: fr24feed
    hostname: fr24feed
    restart: unless-stopped
    depends_on:
      - ultrafeeder
    environment:
      - TZ=${FEEDER_TZ}
      - BEASTHOST=ultrafeeder
      - BEASTPORT=30005
      - FR24KEY=${FEEDER_FR24_SHARING_KEY}
      # FR24 policy: MLAT disabled when sharing with other networks.
      - MLAT=no
    dns_search: .
    tmpfs:
      - /run:exec,size=64M
      - /var/log
    networks:
      - adsb_net

  opensky-feeder:
    image: ghcr.io/sdr-enthusiasts/docker-opensky-network:latest
    container_name: opensky-feeder
    hostname: opensky-feeder
    restart: unless-stopped
    depends_on:
      - ultrafeeder
    environment:
      - TZ=${FEEDER_TZ}
      - BEASTHOST=ultrafeeder
      - BEASTPORT=30005
      - LAT=${FEEDER_LAT}
      - LONG=${FEEDER_LON}
      - ALT=${FEEDER_ALT_M}
      - OPENSKY_USERNAME=${FEEDER_OPENSKY_USERNAME}
      - OPENSKY_SERIAL=${FEEDER_OPENSKY_SERIAL}
    tmpfs:
      - /run:exec,size=64M
      - /var/log
    networks:
      - adsb_net

  rbfeeder:
    image: ghcr.io/sdr-enthusiasts/docker-radarbox:latest
    container_name: rbfeeder
    hostname: rbfeeder
    restart: unless-stopped
    depends_on:
      - ultrafeeder
    environment:
      - TZ=${FEEDER_TZ}
      - LAT=${FEEDER_LAT}
      - LONG=${FEEDER_LON}
      - ALT=${FEEDER_ALT_M}m
      - BEASTHOST=ultrafeeder
      - BEASTPORT=30005
      - SHARING_KEY=${FEEDER_RB_SHARING_KEY}
      # MLAT enabled — AirNav welcomes multi-network MLAT (unlike FR24). The
      # relevant env var if we ever want to disable it is ENABLE_MLAT=false.
    volumes:
      - /mnt/ssd/data/rbfeeder:/etc/rbfeeder
    tmpfs:
      - /run:exec,size=64M
      - /var/log
    networks:
      - adsb_net

  # 978 MHz UAT decoder. Pinned to dongle serial '978' (FA Pro Stick + dual-band
  # filter on splitter leg B). Raw faup978 stream on 30978 → piaware (UAT) and
  # ultrafeeder (READSB_NET_CONNECTOR uat_in) for combined 1090+UAT tar1090 view.
  dump978:
    image: ghcr.io/sdr-enthusiasts/docker-dump978:latest
    container_name: dump978
    hostname: dump978
    restart: unless-stopped
    device_cgroup_rules:
      - 'c 189:* rwm'
    environment:
      - LOGLEVEL=error
      - TZ=${FEEDER_TZ}
      - LAT=${FEEDER_LAT}
      - LON=${FEEDER_LON}
      - DUMP978_RTLSDR_DEVICE=978
      - DUMP978_SDR_GAIN=autogain
      - DUMP978_SDR_PPM=0
    devices:
      - /dev/bus/usb:/dev/bus/usb
    tmpfs:
      - /run:exec,size=64M
      - /var/log
    networks:
      - adsb_net

networks:
  adsb_net:
    external: true
    name: adsb_net
