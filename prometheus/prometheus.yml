global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    station: "aurora-co"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: adsb-stats-exporter
    static_configs:
      - targets: ['adsb-stats-exporter:8080']
    metrics_path: /metrics

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
